<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- グリッドアイコン（2x2）: アクセントカラー -->
  <!-- 左上 -->
  <rect x="5"  y="5"  width="9" height="9" rx="2" fill="#3b82f6"/>
  <!-- 右上 -->
  <rect x="18" y="5"  width="9" height="9" rx="2" fill="#3b82f6" opacity="0.7"/>
  <!-- 左下 -->
  <rect x="5"  y="18" width="9" height="9" rx="2" fill="#3b82f6" opacity="0.7"/>
  <!-- 右下 -->
  <rect x="18" y="18" width="9" height="9" rx="2" fill="#3b82f6" opacity="0.4"/>
</svg>
