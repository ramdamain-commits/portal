<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Ops Console</title>
    <style>
        /* ── リセット + ベース ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 24px 32px;
            line-height: 1.6;
        }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── ヘッダー ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header .timestamp { color: #94a3b8; font-size: 0.85rem; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid #334155;
            cursor: pointer;
            background: #1e293b;
            color: #e2e8f0;
            transition: background 0.15s;
        }
        .btn:hover { background: #334155; }
        .btn-danger { border-color: #7f1d1d; color: #fca5a5; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.15); }

        /* ── Summary Cards ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px 20px;
        }
        .card .label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .card .value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
        .card .sub { font-size: 0.85rem; color: #64748b; margin-top: 2px; }

        /* ── Section ── */
        .section { margin-bottom: 32px; }
        .section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #334155;
        }

        /* ── Attention ── */
        .attention-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: #1e293b;
            border-left: 3px solid #f59e0b;
            border-radius: 0 6px 6px 0;
            margin-bottom: 8px;
        }
        .attention-item.overdue { border-left-color: #ef4444; }
        .attention-item .badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .badge-overdue { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .badge-open { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .badge-due { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .badge-warning { background: rgba(249, 115, 22, 0.2); color: #fdba74; }
        .badge-no-review { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
        .badge-info { background: rgba(100, 116, 139, 0.15); color: #64748b; }
        .all-clear {
            padding: 16px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            color: #4ade80;
            text-align: center;
        }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 1px solid #334155;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e293b;
            font-size: 0.9rem;
        }
        tr:hover td { background: #1e293b; }

        /* ── Category Badge ── */
        .cat-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* ── Timeline ── */
        .timeline-item {
            position: relative;
            padding: 12px 16px 12px 28px;
            margin-bottom: 8px;
            background: #1e293b;
            border-radius: 6px;
            cursor: pointer;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 18px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #60a5fa;
        }
        .timeline-item.superseded { opacity: 0.5; }
        .timeline-item.superseded::before { background: #64748b; }
        .timeline-item .tl-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timeline-item .tl-id { font-weight: 600; color: #60a5fa; }
        .timeline-item .tl-date { font-size: 0.8rem; color: #94a3b8; }
        .timeline-item .tl-title { margin-top: 4px; }
        .timeline-item .tl-project { font-size: 0.8rem; color: #94a3b8; }
        .timeline-detail {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #334155;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        .timeline-detail dt { font-weight: 600; color: #94a3b8; margin-top: 8px; }
        .timeline-detail dd { margin-left: 0; margin-top: 2px; }
        .timeline-item.open .timeline-detail { display: block; }

        /* ── Visibility badge ── */
        .vis-public { color: #4ade80; }
        .vis-limited { color: #fbbf24; }
        .vis-private { color: #94a3b8; }

        /* ── Status badge ── */
        .status-active { color: #4ade80; }
        .status-archived { color: #64748b; }
        .status-planned { color: #60a5fa; }

        /* ── Import Screen ── */
        #import-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 24px;
        }
        #import-screen h1 {
            font-size: 2rem;
            font-weight: 700;
        }
        #import-screen p {
            color: #94a3b8;
            font-size: 1rem;
        }
        .dropzone {
            width: 480px;
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 40px 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .dropzone:hover,
        .dropzone.dragover {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.06);
        }
        .dropzone-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: #475569;
        }
        .dropzone-label {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        .dropzone-label strong { color: #e2e8f0; }
        .btn-import {
            display: inline-block;
            padding: 8px 20px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-import:hover { background: #1d4ed8; }
        .import-error {
            color: #fca5a5;
            font-size: 0.85rem;
            display: none;
        }

        /* ── Dashboard (hidden until data loaded) ── */
        #dashboard { display: none; }
    </style>
</head>
<body>

    <!-- Import Screen -->
    <div id="import-screen">
        <h1>Life Ops Console</h1>
        <p>データファイル (life-ops-export.json) をインポートしてください</p>
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">&#128196;</div>
            <div class="dropzone-label"><strong>ファイルをドロップ</strong> または</div>
            <button class="btn-import" id="btn-pick-file">ファイルを選択</button>
        </div>
        <div class="import-error" id="import-error"></div>
        <input type="file" id="file-input" accept=".json" style="display:none">
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="header">
            <h1>Life Ops Console</h1>
            <div class="header-right">
                <span class="timestamp" id="sync-label"></span>
                <button class="btn" id="btn-fetch">再取得</button>
                <button class="btn" id="btn-refresh">データ更新</button>
                <button class="btn btn-danger" id="btn-clear">データ消去</button>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="cards" id="cards"></div>

        <!-- Attention Required -->
        <div class="section">
            <h2>Attention Required</h2>
            <div id="attention"></div>
        </div>

        <!-- Project Matrix -->
        <div class="section">
            <h2>Project Matrix</h2>
            <table>
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Status</th>
                        <th>Visibility</th>
                        <th>Category</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody id="project-matrix"></tbody>
            </table>
        </div>

        <!-- Decision Timeline -->
        <div class="section">
            <h2>Decision Timeline</h2>
            <div id="timeline"></div>
        </div>
    </div>

    <!-- Hidden file input for refresh -->
    <input type="file" id="file-refresh" accept=".json" style="display:none">

    <script>
    // ── グローバル変数 ──
    let PROJECTS = [];
    let ASSUMPTIONS = [];
    let DECISIONS = [];
    let REVIEWS = [];
    let CATEGORIES = {};
    let EXPORTED_AT = '';

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // ── ユーティリティ ──
    function daysDiff(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        const parsed = new Date(y, m - 1, d);
        return Math.ceil((parsed - today) / (1000 * 60 * 60 * 24));
    }

    function escapeHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ── データのロードと状態切替 ──
    function loadFromStorage() {
        const raw = localStorage.getItem('lifeOpsData');
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            applyData(data);
            return true;
        } catch (e) {
            return false;
        }
    }

    function applyData(data) {
        PROJECTS    = data.projects    || [];
        ASSUMPTIONS = data.assumptions || [];
        DECISIONS   = data.decisions   || [];
        REVIEWS     = data.reviews     || [];
        CATEGORIES  = data.categories  || {};
        EXPORTED_AT = data.exportedAt  || '';
        renderDashboard();
        showDashboard();
    }

    function showImport() {
        document.getElementById('import-screen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard() {
        document.getElementById('import-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    // ── ファイル読み込み ──
    function readJsonFile(file, onSuccess) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                onSuccess(data);
            } catch (err) {
                showImportError('JSONのパースに失敗しました: ' + err.message);
            }
        };
        reader.readAsText(file, 'UTF-8');
    }

    function showImportError(msg) {
        const el = document.getElementById('import-error');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function handleImportFile(file) {
        if (!file) return;
        readJsonFile(file, (data) => {
            localStorage.setItem('lifeOpsData', JSON.stringify(data));
            // Reset dashboard before re-render
            clearDashboardDom();
            applyData(data);
        });
    }

    function clearDashboardDom() {
        document.getElementById('cards').innerHTML = '';
        document.getElementById('attention').innerHTML = '';
        document.getElementById('project-matrix').innerHTML = '';
        document.getElementById('timeline').innerHTML = '';
    }

    // ── Import Screen イベント ──
    const fileInput = document.getElementById('file-input');
    document.getElementById('btn-pick-file').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleImportFile(e.target.files[0]));

    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) handleImportFile(file);
    });

    // ── Header ボタン ──
    document.getElementById('btn-fetch').addEventListener('click', async () => {
        if (await fetchExport()) return;
        alert('JSONの取得に失敗しました。「データ更新」でファイルを選択してください。');
    });

    const fileRefresh = document.getElementById('file-refresh');
    document.getElementById('btn-refresh').addEventListener('click', () => fileRefresh.click());
    fileRefresh.addEventListener('change', (e) => handleImportFile(e.target.files[0]));

    document.getElementById('btn-clear').addEventListener('click', () => {
        if (confirm('localStorageのデータを消去し、インポート画面に戻りますか？')) {
            localStorage.removeItem('lifeOpsData');
            clearDashboardDom();
            showImport();
        }
    });

    // ── Attention 算出 ──
    function computeAttention() {
        const items = [];

        ASSUMPTIONS.filter(a => a.status === 'open' && a.reviewDate).forEach(a => {
            const days = daysDiff(a.reviewDate);
            if (days < 0) {
                items.push({ id: a.id, project: a.project, text: a.statement, type: 'overdue', days: days, sort: days });
            } else if (days <= 30) {
                items.push({ id: a.id, project: a.project, text: a.statement, type: 'due', days: days, sort: days + 1000 });
            }
        });

        REVIEWS.forEach(r => {
            (r.findings || []).filter(f => f.status === 'open').forEach(f => {
                items.push({ id: f.findingId, project: f.project, text: f.summary, type: 'open', days: null, sort: 500 });
            });
        });

        DECISIONS.filter(d => d.status === 'accepted').forEach(d => {
            if (!d.reviewDate) {
                items.push({ id: d.id, project: d.project, text: d.title, type: 'no-review', days: null, sort: 2500 });
                return;
            }
            const days = daysDiff(d.reviewDate);
            if (days >= 0 && days <= 30) {
                items.push({ id: d.id, project: d.project, text: d.title, type: 'due', days: days, sort: days + 2000 });
            }
        });

        PROJECTS.filter(p => p.portalVisible === true && p.visibility === 'private').forEach(p => {
            items.push({ id: p.id, project: p.displayName, text: 'ポータル公開設定が private と矛盾', type: 'warning', days: null, sort: 3000 });
        });

        items.sort((a, b) => a.sort - b.sort);

        if (items.length > 10) {
            const omitted = items.length - 10;
            items.splice(10);
            items.push({ id: '...', project: '', text: `+${omitted}件`, type: 'info', days: null, sort: 9999 });
        }

        return items;
    }

    // ── Summary Cards ──
    function renderCards() {
        const activeProjects = PROJECTS.filter(p => p.status === 'active').length;
        const openAssumptions = ASSUMPTIONS.filter(a => a.status === 'open').length;
        const overdueAssumptions = ASSUMPTIONS.filter(a => a.status === 'open' && a.reviewDate && daysDiff(a.reviewDate) < 0).length;
        const acceptedDecisions = DECISIONS.filter(d => d.status === 'accepted').length;
        const allFindings = REVIEWS.flatMap(r => r.findings || []);
        const openFindings = allFindings.filter(f => f.status === 'open').length;

        const cards = [
            { label: 'Projects', value: activeProjects, sub: `/ ${PROJECTS.length} total` },
            { label: 'Assumptions', value: `${overdueAssumptions} overdue`, sub: `/ ${openAssumptions} open` },
            { label: 'Decisions', value: acceptedDecisions, sub: 'accepted' },
            { label: 'Findings', value: `${openFindings} open`, sub: `/ ${allFindings.length} total` },
        ];

        const container = document.getElementById('cards');
        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="label">${c.label}</div><div class="value">${c.value}</div><div class="sub">${c.sub}</div>`;
            container.appendChild(div);
        });
    }

    // ── Attention ──
    function renderAttention() {
        const items = computeAttention();
        const container = document.getElementById('attention');

        if (items.length === 0) {
            container.innerHTML = '<div class="all-clear">All clear &#8212; &#23550;&#24540;&#19981;&#35201;</div>';
            return;
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'attention-item' + (item.type === 'overdue' ? ' overdue' : '');

            let badgeClass, badgeText;
            if (item.type === 'overdue') {
                badgeClass = 'badge-overdue';
                badgeText = `${Math.abs(item.days)}&#26085;&#36229;&#36942;`;
            } else if (item.type === 'open') {
                badgeClass = 'badge-open';
                badgeText = 'open';
            } else if (item.type === 'warning') {
                badgeClass = 'badge-warning';
                badgeText = '&#30896;&#30431;';
            } else if (item.type === 'no-review') {
                badgeClass = 'badge-no-review';
                badgeText = '&#26410;&#35373;&#23450;';
            } else if (item.type === 'info') {
                badgeClass = 'badge-info';
                badgeText = item.text;
            } else {
                badgeClass = 'badge-due';
                badgeText = `&#27231;${item.days}&#26085;`;
            }

            const isInfo = item.type === 'info';
            div.innerHTML = isInfo
                ? `<span class="badge ${badgeClass}">${escapeHtml(item.text)}</span>`
                : `
                <span class="badge ${badgeClass}">${badgeText}</span>
                <span style="font-weight:600;min-width:100px">[${escapeHtml(item.id)}]</span>
                <span style="color:#94a3b8;min-width:120px">${escapeHtml(item.project)}</span>
                <span>${escapeHtml(item.text)}</span>
            `;
            container.appendChild(div);
        });
    }

    // ── Project Matrix ──
    function renderProjectMatrix() {
        const tbody = document.getElementById('project-matrix');
        PROJECTS.forEach(p => {
            const cat = CATEGORIES[p.category] || {};
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHtml(p.displayName)}${p.portalVisible ? ' &#127760;' : ''}</td>
                <td><span class="status-${p.status}">${p.status}</span></td>
                <td><span class="vis-${p.visibility}">${p.visibility}</span></td>
                <td><span class="cat-badge" style="background:${cat.bgColor || '#334155'};color:${cat.textColor || '#e2e8f0'}">${escapeHtml(p.category)}</span></td>
                <td style="color:#94a3b8;font-size:0.85rem">${escapeHtml(p.note || '')}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ── Decision Timeline ──
    function renderTimeline() {
        const container = document.getElementById('timeline');
        const sorted = [...DECISIONS].sort((a, b) => b.date.localeCompare(a.date));

        sorted.forEach(d => {
            const div = document.createElement('div');
            div.className = 'timeline-item' + (d.status === 'superseded' ? ' superseded' : '');

            let linkedHtml = '';
            if (d.linkedAssumptions && d.linkedAssumptions.length > 0) {
                const linked = d.linkedAssumptions.map(id => {
                    const found = ASSUMPTIONS.find(a => a.id === id);
                    return found ? `${id}: ${escapeHtml(found.statement)}` : id;
                }).join('<br>');
                linkedHtml = `<dt>Linked Assumptions</dt><dd>${linked}</dd>`;
            }

            div.innerHTML = `
                <div class="tl-header">
                    <span><span class="tl-id">${d.id}</span> <span class="tl-project">${escapeHtml(d.project)}</span></span>
                    <span class="tl-date">${d.date} / ${d.status}</span>
                </div>
                <div class="tl-title">${escapeHtml(d.title)}</div>
                <dl class="timeline-detail">
                    <dt>Decision</dt><dd>${escapeHtml(d.decision)}</dd>
                    <dt>Rationale</dt><dd>${escapeHtml(d.rationale)}</dd>
                    ${linkedHtml}
                </dl>
            `;
            div.addEventListener('click', () => div.classList.toggle('open'));
            container.appendChild(div);
        });
    }

    // ── ダッシュボード全体レンダリング ──
    function renderDashboard() {
        clearDashboardDom();
        document.getElementById('sync-label').textContent = 'Last synced: ' + (EXPORTED_AT || '---');
        renderCards();
        renderAttention();
        renderProjectMatrix();
        renderTimeline();
    }

    // ── fetch による自動読込 ──
    async function fetchExport() {
        try {
            const res = await fetch('life-ops-export.json', { cache: 'no-cache' });
            if (!res.ok) return false;
            const data = await res.json();
            localStorage.setItem('lifeOpsData', JSON.stringify(data));
            applyData(data);
            return true;
        } catch (e) {
            return false;
        }
    }

    // ── 起動 ──
    (async () => {
        if (await fetchExport()) return;
        if (loadFromStorage()) return;
        showImport();
    })();
    </script>
</body>
</html>
